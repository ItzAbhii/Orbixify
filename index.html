<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orbixify</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  overflow: hidden;
  background: linear-gradient(270deg, #0f172a, #1e293b, #020617);
  background-size: 600% 600%;
  animation: gradientBG 15s ease infinite;
  color: white;
}

@keyframes gradientBG {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

/* CENTER TEXT */
#centerText {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  z-index: 1;
}

#title {
  font-size: 70px;
  font-weight: 700;
  background: linear-gradient(90deg, #38bdf8, #a855f7);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

#subtitle {
  font-size: 18px;
  opacity: 0.8;
}

/* SEARCH */
#searchBox {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  padding: 12px;
  border-radius: 12px;
  border: none;
  width: 300px;
}

/* ADD PANEL */
#addPanel {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.6);
  padding: 10px;
  border-radius: 12px;
}

#addPanel input {
  margin: 5px;
  padding: 6px;
  border-radius: 6px;
  border: none;
}

/* BUBBLES */
.bubble {
  position: absolute;
  border-radius: 50%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  transition: transform 0.2s;
  text-align: center;
}

.bubble:hover {
  transform: scale(1.2);
}

.bubble img {
  width: 40px;
  height: 40px;
}

.bubble span {
  font-size: 12px;
}
</style>
</head>
<body>

<div id="centerText">
  <div id="title">Orbixify</div>
  <div id="subtitle">Launch your favorite websites instantly with style.</div>
</div>

<input id="searchBox" placeholder="Search a site...">

<div id="addPanel">
  <input id="nameInput" placeholder="Name">
  <input id="urlInput" placeholder="URL">
  <input id="iconInput" placeholder="Icon URL">
  <button onclick="addSite()">Add</button>
</div>

<script>
let sites = JSON.parse(localStorage.getItem("sites")) || [
  { name: "Canva", url: "https://www.canva.com", icon: "https://img.icons8.com/color/96/canva.png" },
  { name: "YouTube", url: "https://youtube.com", icon: "https://img.icons8.com/color/96/youtube-play.png" },
  { name: "Google", url: "https://google.com", icon: "https://img.icons8.com/color/96/google-logo.png" },
  { name: "ChatGPT", url: "https://chat.openai.com", icon: "https://img.icons8.com/fluency/96/chatgpt.png" },
  { name: "Instagram", url: "https://instagram.com", icon: "https://img.icons8.com/color/96/instagram-new.png" },
  { name: "Netflix", url: "https://netflix.com", icon: "https://img.icons8.com/color/96/netflix.png" }
];

function saveSites(){localStorage.setItem("sites", JSON.stringify(sites));}

function createBubble(site){
  const b = document.createElement("div");
  b.className = "bubble";
  b.style.width = "110px";
  b.style.height = "110px";
  b.style.left = Math.random() * (window.innerWidth-110)+"px";
  b.style.top = Math.random() * (window.innerHeight-110)+"px";

  b.innerHTML = `<img src="${site.icon}"><span>${site.name}</span>`;
  b.onclick = ()=>window.location.href = site.url;

  document.body.appendChild(b);

  let dx=(Math.random()-0.5)*2, dy=(Math.random()-0.5)*2;

  function move(){
    let x=b.offsetLeft+dx, y=b.offsetTop+dy;
    if(x<0||x>window.innerWidth-110) dx*=-1;
    if(y<0||y>window.innerHeight-110) dy*=-1;
    b.style.left=x+"px";
    b.style.top=y+"px";
    requestAnimationFrame(move);
  }
  move();
}

function loadBubbles(){
  document.querySelectorAll('.bubble').forEach(e=>e.remove());
  sites.forEach(createBubble);
}

function addSite(){
  const name=nameInput.value;
  const url=urlInput.value;
  const icon=iconInput.value || "https://img.icons8.com/fluency/96/link.png";
  if(!name||!url) return alert("Fill fields bro 😭");
  sites.push({name,url,icon});
  saveSites();
  loadBubbles();
}

searchBox.addEventListener("keydown",e=>{
  if(e.key==='Enter'){
    const v=searchBox.value.toLowerCase();
    const f=sites.find(s=>s.name.toLowerCase().includes(v));
    if(f) window.location.href=f.url;
    else alert("Not found 😭");
  }
});

loadBubbles();
</script>

</body>
</html>
